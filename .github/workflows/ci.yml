name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      # Build must succeed without real secrets. Placeholder env only.
      # (Add any repo-specific NEXT_PUBLIC_* / server vars this app reads at build time.)
      - name: Write placeholder .env for build
        run: cp .env.example .env
      - run: npm run build
